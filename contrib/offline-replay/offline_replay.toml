user = "{user}"
[tiles]
    [tiles.gui]
        enabled = true
        gui_listen_address = "0.0.0.0"
        db_size_gib = 10
    [tiles.metric]
        prometheus_listen_address = "0.0.0.0"
[accounts]
    max_accounts = {index_max}
[runtime]
    max_live_slots = 128
    max_fork_width = 4
    [runtime.program_cache]
        heap_size_mib = 4096
[log]
    level_stderr = "DEBUG"
    path = "{log}"
[paths]
    snapshots = "{ledger}"
    accounts = "{ledger}/accounts.db"
    genesis = "{ledger}/genesis.bin"
[snapshots]
    max_full_snapshots_to_keep = 5
    [snapshots.sources]
        servers = []
        [snapshots.sources.gossip]
            allow_any = false
            allow_list = []
[gossip]
    entrypoints = [ "0.0.0.0:1" ]
[development]
    [development.ledger_input]
        format = "pcap"
        path = "{ledger}/shreds.pcapng.zst"
        end_slot = {end_slot}
    [development.backtest]
        root_distance = 32
