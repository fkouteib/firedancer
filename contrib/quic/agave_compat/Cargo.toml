[package]
name = "firedancer-agave-quic-test"
version = "0.1.0"
edition = "2021"
publish = false
build = "build.rs"

[build-dependencies]
bindgen = "0.70"

[dependencies]
agave-votor-messages = { path = "../../../agave/votor-messages", features = ["agave-unstable-api"] }
